<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>⛳ Golf Scorecard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8fafc;min-height:100vh}
  input,select,button{font-family:inherit}
  ::-webkit-scrollbar{height:4px;width:4px}
  ::-webkit-scrollbar-track{background:#f1f5f9}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── STORAGE ───────────────────────────────────────────────────────────────────
const DB = {
  set(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}},
  get(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}},
  del(key){try{localStorage.removeItem(key);}catch(e){}},
  keys(prefix){try{return Object.keys(localStorage).filter(k=>k.startsWith(prefix));}catch(e){return[];}},
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TEES=[
  {id:"black",label:"Black",emoji:"⬛",color:"#111827",bg:"#f3f4f6",desc:"Championship"},
  {id:"blue", label:"Blue", emoji:"🟦",color:"#1d4ed8",bg:"#dbeafe",desc:"Men scratch"},
  {id:"white",label:"White",emoji:"⬜",color:"#374151",bg:"#f9fafb",desc:"Men regular"},
  {id:"red",  label:"Red",  emoji:"🟥",color:"#dc2626",bg:"#fee2e2",desc:"Women/Senior"},
];
const TEE_FACTOR={black:1.0,blue:0.93,white:0.86,red:0.77};

const DEFAULT_PLAYERS=[
  {id:"chavis",name:"Chavis",team:"Chavis",hcp:18,tee:"white"},
  {id:"lisa",  name:"Lisa",  team:"Chavis",hcp:24,tee:"red"},
  {id:"joy",   name:"Joy",   team:"Chavis",hcp:20,tee:"red"},
  {id:"ken",   name:"Ken",   team:"Ken",   hcp:16,tee:"blue"},
  {id:"bob",   name:"Bob",   team:"Ken",   hcp:18,tee:"white"},
  {id:"leo",   name:"Leo",   team:"Ken",   hcp:22,tee:"white"},
  {id:"tony",  name:"Tony",  team:"Tony",  hcp:14,tee:"blue"},
  {id:"rose",  name:"Rose",  team:"Tony",  hcp:20,tee:"red"},
  {id:"jane",  name:"Jane",  team:"Tony",  hcp:24,tee:"red"},
];
const TEAMS=["Chavis","Ken","Tony"];
const TEAM_COLORS={Chavis:"#f59e0b",Ken:"#3b82f6",Tony:"#10b981"};
const TEAM_BG={Chavis:"#fef3c7",Ken:"#dbeafe",Tony:"#d1fae5"};
const CLUBS_P1=["Driver","3W","5W","3I","4I","5I","6I","7I","8I","9I","PW","AW","SW","LW","Penalty"];
const CLUBS_P2=["SW","LW","PW","AW","9I","Putter","Penalty"];
const MAX_STROKES={3:5,4:6,5:7};
const P2_THRESHOLD={3:50,4:50,5:80};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const calcHcpStrokes=(hcp,n)=>Math.round((hcp/18)*n*10)/10;
const getTee=id=>TEES.find(t=>t.id===id)||TEES[2];
const holeYardsForTee=(hole,teeId)=>{
  if(!hole)return 0;
  const v=parseInt(hole.yards?.[teeId]);if(v>0)return v;
  const b=parseInt(hole.yards?.black);if(b>0)return Math.round(b*TEE_FACTOR[teeId]);
  const w=parseInt(hole.yards?.white);if(w>0)return Math.round(w/TEE_FACTOR.white*TEE_FACTOR[teeId]);
  return 0;
};

// ── STORAGE HELPERS ───────────────────────────────────────────────────────────
const savePlayers=pl=>DB.set("golf_players",pl);
const loadPlayers=()=>{const p=DB.get("golf_players");return p?p.map(x=>({tee:"white",...x})):DEFAULT_PLAYERS;};
const saveSession=s=>DB.set(`golf_session_${s.id}`,s);
const loadAllSessions=()=>DB.keys("golf_session_").map(k=>DB.get(k)).filter(Boolean).sort((a,b)=>new Date(b.date)-new Date(a.date));

// ── SHARED COMPONENTS ─────────────────────────────────────────────────────────
const TeeBadge=({teeId,size="sm"})=>{
  const t=getTee(teeId);const fs=size==="lg"?14:11;
  return <span style={{background:t.bg,color:t.color,border:`1.5px solid ${t.color}`,borderRadius:99,
    padding:size==="lg"?"4px 12px":"2px 7px",fontSize:fs,fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}>
    {t.emoji} {t.label}
  </span>;
};
const Badge=({color,children})=><span style={{
  background:TEAM_BG[color]||"#f3f4f6",color:TEAM_COLORS[color]||"#374151",
  border:`1.5px solid ${TEAM_COLORS[color]||"#d1d5db"}`,
  borderRadius:99,padding:"2px 9px",fontSize:11,fontWeight:700}}>{children}</span>;

const th={padding:"6px 8px",textAlign:"center",fontWeight:700,fontSize:11,color:"#374151",borderBottom:"1px solid #e5e7eb"};
const th2={padding:"8px 10px",textAlign:"center",fontWeight:700,fontSize:12,color:"#fff"};
const td={padding:"6px 8px",textAlign:"center",borderBottom:"1px solid #f3f4f6",fontSize:12};

// Trạng thái của 1 ô (player × hole)
const cellInfo=(ps)=>{
  if(!ps||(!ps.p1shots?.length&&ps.phase===1))
    return{label:"—",color:"#d1d5db",bg:"#f9fafb",border:"#e5e7eb",done:false};
  const total=(ps.p1shots?.length||0)+(ps.p2shots?.length||0);
  if(ps.phase===3)
    return{label:`${total}`,color:"#16a34a",bg:"#f0fdf4",border:"#86efac",done:true};
  if(ps.phase===2)
    return{label:`${total}⛳`,color:"#d97706",bg:"#fffbeb",border:"#fde68a",done:false};
  return{label:`${total}*`,color:"#1d4ed8",bg:"#eff6ff",border:"#bfdbfe",done:false};
};

// ── SCORING ───────────────────────────────────────────────────────────────────
const calcHoleStrokes=(ps,par)=>{
  const max=MAX_STROKES[par];
  return Math.min(ps.p1shots?.length||0,max)+(ps.p2shots?.length||0);
};
const calcSessionScores=(sess)=>{
  const numH=sess.holes.length;
  const playerScores=sess.players.map(p=>{
    let gross=0;
    sess.holes.forEach(h=>{const s=h.strokes[p.id];if(s)gross+=calcHoleStrokes(s,h.par);});
    const hcpStrokes=calcHcpStrokes(p.hcp,numH);
    return{...p,gross,net:gross-hcpStrokes,hcpStrokes};
  });
  const teamScores=TEAMS.map(team=>{
    const members=playerScores.filter(p=>p.team===team);
    return{team,members:members.map(p=>p.name),
      grossTotal:members.reduce((s,p)=>s+p.gross,0),
      netTotal:members.reduce((s,p)=>s+p.net,0)};
  }).sort((a,b)=>a.netTotal-b.netTotal);
  return{playerScores,teamScores};
};

// ═════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════════════════════════
function App(){
  const [tab,          setTab]          =useState("session");
  const [players,      setPlayersState] =useState([]);
  const [sessions,     setSessions]     =useState([]);
  const [sessionDate,  setSessionDate]  =useState(today());
  const [activePlayers,setActivePlayers]=useState([]);
  const [holes,        setHoles]        =useState([]);
  const [phase,        setPhase]        =useState("setup");
  // Ô đang chỉnh: {pid, holeIdx} hoặc null
  const [editing,      setEditing]      =useState(null);
  const [shotClub,     setShotClub]     =useState("");
  const [shotYards,    setShotYards]    =useState("");
  const [showHistory,  setShowHistory]  =useState(null);

  useEffect(()=>{
    const pl=loadPlayers();
    setPlayersState(pl);
    setActivePlayers(pl.map(p=>({...p,active:true})));
    setSessions(loadAllSessions());
  },[]);

  const setPlayers=pl=>{setPlayersState(pl);savePlayers(pl);};
  const activePl=activePlayers.filter(p=>p.active);

  // Lấy dữ liệu ô đang edit
  const editHole   = editing!==null ? holes[editing.holeIdx]   : null;
  const editPlayer = editing!==null ? activePl.find(p=>p.id===editing.pid) : null;
  const editPs     = editHole&&editPlayer ? editHole.strokes[editPlayer.id] : null;

  // ── SETUP ──────────────────────────────────────────────────────────────────
  const makeBlankStrokes=()=>Object.fromEntries(
    activePlayers.filter(p=>p.active).map(p=>[p.id,{p1shots:[],p2shots:[],phase:1,enteredP2At50:false}])
  );

  const addHole=par=>setHoles(prev=>[...prev,{
    id:uid(),par,
    yards:{black:"",blue:"",white:"",red:""},
    strokes:makeBlankStrokes(),
  }]);
  const removeHole=idx=>setHoles(prev=>prev.filter((_,i)=>i!==idx));

  const autoFillYards=(hIdx,teeId,val)=>{
    const num=parseInt(val)||0;
    setHoles(prev=>prev.map((h,i)=>{
      if(i!==hIdx)return h;
      const newY={...h.yards};newY[teeId]=val;
      if(num>0){
        const f=TEE_FACTOR[teeId];
        if(!parseInt(newY.black))newY.black=String(Math.round(num/f*TEE_FACTOR.black));
        if(!parseInt(newY.blue)) newY.blue =String(Math.round(num/f*TEE_FACTOR.blue));
        if(!parseInt(newY.white))newY.white=String(Math.round(num/f*TEE_FACTOR.white));
        if(!parseInt(newY.red))  newY.red  =String(Math.round(num/f*TEE_FACTOR.red));
        newY[teeId]=val;
      }
      return{...h,yards:newY};
    }));
  };

  const startSession=()=>{
    if(activePl.length<1)return alert("Cần ít nhất 1 người!");
    if(holes.length===0) return alert("Cần thêm ít nhất 1 hố!");
    setPhase("playing");
    setEditing(null);
    setShotClub("");setShotYards("");
  };

  // ── PLAYING: mở / đóng ô edit ─────────────────────────────────────────────
  const openCell=(pid,holeIdx)=>{
    const ps=holes[holeIdx]?.strokes[pid];
    if(ps?.phase===3){
      // Đã xong → hỏi có muốn sửa không
      if(!window.confirm("Người này đã hoàn thành hố này. Mở lại để sửa?"))return;
      // Reopen: quay về phase 2 nếu có p2shots, ngược lại phase 1
      const newPs={...ps,phase:ps.p2shots?.length>0?2:1};
      updatePs(pid,holeIdx,newPs);
    }
    setEditing({pid,holeIdx});
    setShotClub("");setShotYards("");
  };

  const closeEdit=()=>{setEditing(null);setShotClub("");setShotYards("");};

  // Helper cập nhật strokes
  const updatePs=(pid,holeIdx,newPs)=>{
    setHoles(prev=>{
      const n=[...prev];
      n[holeIdx]={...n[holeIdx],strokes:{...n[holeIdx].strokes,[pid]:newPs}};
      return n;
    });
  };

  // ── SHOT RECORDING ────────────────────────────────────────────────────────
  const recordShotP1=()=>{
    if(!shotClub)return alert("Chọn gậy!");
    if(!editPs)return;
    const measured=parseInt(shotYards)||0;
    const max=MAX_STROKES[editHole.par];
    const threshold=P2_THRESHOLD[editHole.par];
    const newShots=[...editPs.p1shots,{club:shotClub,yardsMeasured:measured}];
    const totalY=holeYardsForTee(editHole,editPlayer.tee||"white");
    const usedY=newShots.reduce((s,sh)=>s+(sh.yardsMeasured||0),0);
    const remaining=totalY?Math.max(0,totalY-usedY):null;
    const hitYard  =remaining!==null&&remaining<=threshold;
    const hitStroke=newShots.length>=max;
    const moveToP2 =hitYard||hitStroke;
    updatePs(editing.pid,editing.holeIdx,{
      ...editPs,p1shots:newShots,phase:moveToP2?2:1,enteredP2At50:hitYard,
    });
    setShotClub("");setShotYards("");
  };

  const recordShotP2=()=>{
    if(!shotClub)return alert("Chọn gậy!");
    if(!editPs)return;
    updatePs(editing.pid,editing.holeIdx,{
      ...editPs,p2shots:[...editPs.p2shots,{club:shotClub}],
    });
    setShotClub("");setShotYards("");
  };

  const undoShot=()=>{
    if(!editPs)return;
    let newPs;
    if(editPs.phase===2&&editPs.p2shots.length>0)
      newPs={...editPs,p2shots:editPs.p2shots.slice(0,-1)};
    else if(editPs.phase===2&&editPs.p2shots.length===0)
      newPs={...editPs,phase:1,enteredP2At50:false};
    else if(editPs.p1shots.length>0)
      newPs={...editPs,p1shots:editPs.p1shots.slice(0,-1)};
    else return;
    updatePs(editing.pid,editing.holeIdx,newPs);
    setShotClub("");setShotYards("");
  };

  const finishP2=()=>{
    if(!editPs)return;
    updatePs(editing.pid,editing.holeIdx,{...editPs,phase:3});
    setShotClub("");setShotYards("");
    // Sau khi xong → đóng panel, về grid
    setEditing(null);
  };

  const finishSession=()=>{
    const sess={id:uid(),date:sessionDate,players:activePl,holes};
    saveSession(sess);
    setSessions(prev=>[sess,...prev]);
    setPhase("done");
  };

  // ── RENDER SETUP ──────────────────────────────────────────────────────────
  const renderSetup=()=>(
    <div style={{maxWidth:740,margin:"0 auto"}}>
      <h2 style={{fontSize:22,fontWeight:800,color:"#1f2937",marginBottom:16}}>⚙️ Thiết lập buổi chơi</h2>

      <div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,border:"1.5px solid #e5e7eb"}}>
        <label style={{fontWeight:700,color:"#374151"}}>📅 Ngày tập: </label>
        <input type="date" value={sessionDate} onChange={e=>setSessionDate(e.target.value)}
          style={{marginLeft:8,padding:"6px 12px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:15}}/>
      </div>

      <div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,border:"1.5px solid #e5e7eb"}}>
        <div style={{fontWeight:700,color:"#374151",marginBottom:10}}>👥 Thành viên tham gia:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {activePlayers.map((p,i)=>(
            <div key={p.id} onClick={()=>setActivePlayers(prev=>prev.map((x,j)=>j===i?{...x,active:!x.active}:x))}
              style={{display:"flex",alignItems:"center",gap:7,background:p.active?TEAM_BG[p.team]:"#f9fafb",
                border:`2px solid ${p.active?TEAM_COLORS[p.team]:"#e5e7eb"}`,borderRadius:10,
                padding:"7px 12px",cursor:"pointer",opacity:p.active?1:0.4}}>
              <span style={{fontWeight:700,fontSize:14}}>{p.name}</span>
              <Badge color={p.team}>{p.team}</Badge>
              <TeeBadge teeId={p.tee||"white"}/>
              <span style={{fontSize:11,color:"#6b7280"}}>HCP {p.hcp}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:8,fontSize:11,color:"#9ca3af"}}>Click để bật/tắt. Tee cài trong ⚙️ Cài đặt.</div>
      </div>

      <div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:14,border:"1.5px solid #e5e7eb"}}>
        <div style={{fontWeight:700,color:"#374151",marginBottom:10}}>⛳ Thêm hố đánh:</div>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[3,4,5].map(par=>(
            <button key={par} onClick={()=>addHole(par)} style={{background:"#1f2937",color:"#fff",border:"none",
              borderRadius:10,padding:"9px 20px",fontWeight:700,fontSize:14,cursor:"pointer"}}>+ Par {par}</button>
          ))}
        </div>
        {holes.length===0&&<div style={{color:"#9ca3af",fontSize:13}}>Chưa có hố nào.</div>}
        {holes.map((h,i)=>(
          <div key={h.id} style={{background:"#f9fafb",borderRadius:12,padding:"12px 14px",marginBottom:10,border:"1.5px solid #e5e7eb"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <span style={{fontWeight:800,fontSize:14}}>Hố {i+1} · Par {h.par}</span>
                <span style={{marginLeft:8,fontSize:11,color:"#9ca3af",background:"#f3f4f6",borderRadius:5,padding:"2px 7px"}}>
                  ≤{P2_THRESHOLD[h.par]}y · max {MAX_STROKES[h.par]} gậy
                </span>
              </div>
              <button onClick={()=>removeHole(i)} style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>
              {TEES.map(tee=>(
                <div key={tee.id} style={{background:tee.bg,border:`1.5px solid ${tee.color}`,borderRadius:7,padding:"7px 8px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:3,marginBottom:3}}>
                    <span style={{fontSize:13}}>{tee.emoji}</span>
                    <span style={{fontWeight:700,fontSize:12,color:tee.color}}>{tee.label}</span>
                  </div>
                  <input type="number" value={h.yards[tee.id]} min={0} max={700}
                    onChange={e=>setHoles(prev=>prev.map((hh,ii)=>ii===i?{...hh,yards:{...hh.yards,[tee.id]:e.target.value}}:hh))}
                    onBlur={e=>autoFillYards(i,tee.id,e.target.value)}
                    placeholder="yard"
                    style={{width:"100%",padding:"5px 7px",borderRadius:5,border:`1.5px solid ${tee.color}`,
                      fontSize:13,textAlign:"center",background:"#fff",boxSizing:"border-box"}}/>
                </div>
              ))}
            </div>
            <div style={{marginTop:5,fontSize:10,color:"#9ca3af"}}>💡 Nhập 1 tee → các tee khác tự gợi ý</div>
          </div>
        ))}
      </div>

      <button onClick={startSession} style={{background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",
        borderRadius:12,padding:"13px 36px",fontSize:16,fontWeight:800,cursor:"pointer",
        boxShadow:"0 4px 14px rgba(22,163,74,0.4)"}}>🏌️ Bắt đầu đánh!</button>
    </div>
  );

  // ── RENDER PLAYING ────────────────────────────────────────────────────────
  const renderPlaying=()=>{
    // Tổng số ô và số ô đã xong
    const totalCells=activePl.length*holes.length;
    const doneCells=holes.reduce((acc,h)=>acc+activePl.filter(p=>{const ps=h.strokes[p.id];return ps&&ps.phase===3;}).length,0);
    const allDone=doneCells===totalCells&&totalCells>0;

    return(
      <div style={{maxWidth:700,margin:"0 auto"}}>

        {/* TOP BAR */}
        <div style={{background:"linear-gradient(135deg,#1f2937,#374151)",borderRadius:14,padding:"14px 18px",marginBottom:14,color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:18,fontWeight:900}}>📋 Scorecard</div>
            <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>Click ô bất kỳ để nhập gậy</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,color:"#9ca3af"}}>Hoàn thành</div>
            <div style={{fontSize:22,fontWeight:900,color:allDone?"#6ee7b7":"#fff"}}>{doneCells}/{totalCells}</div>
          </div>
        </div>

        {/* GRID: rows = players, cols = holes */}
        <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",overflow:"hidden",marginBottom:14}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#1f2937"}}>
                  <th style={{...th,color:"#9ca3af",textAlign:"left",padding:"8px 12px",minWidth:90}}>Người</th>
                  {holes.map((h,i)=>(
                    <th key={h.id} style={{...th,color:"#fff",minWidth:60}}>
                      H{i+1}<br/>
                      <span style={{fontWeight:400,fontSize:10,color:"#9ca3af"}}>P{h.par}</span>
                    </th>
                  ))}
                  <th style={{...th,color:"#fff"}}>Tổng</th>
                </tr>
              </thead>
              <tbody>
                {activePl.map(p=>{
                  let total=0;
                  const isEditingRow=editing&&editing.pid===p.id;
                  return(
                    <tr key={p.id} style={{background:isEditingRow?TEAM_BG[p.team]:"#fff"}}>
                      <td style={{...td,textAlign:"left",padding:"7px 12px",fontWeight:700}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                          <span style={{color:TEAM_COLORS[p.team],fontSize:14}}>●</span>
                          <span>{p.name}</span>
                          <TeeBadge teeId={p.tee||"white"}/>
                        </div>
                      </td>
                      {holes.map((h,hIdx)=>{
                        const ps=h.strokes[p.id];
                        const ci=cellInfo(ps);
                        const sc=ps?calcHoleStrokes(ps,h.par):0;
                        if(sc>0)total+=sc;
                        const isEditCell=editing&&editing.pid===p.id&&editing.holeIdx===hIdx;
                        const diff=sc>0?sc-h.par:null;
                        return(
                          <td key={h.id}
                            onClick={()=>openCell(p.id,hIdx)}
                            style={{...td,cursor:"pointer",fontWeight:700,
                              background:isEditCell?"#1f2937":ci.bg,
                              color:isEditCell?"#fff":diff===null?"#d1d5db":diff<0?"#16a34a":diff===0?"#374151":diff===1?"#d97706":"#ef4444",
                              border:isEditCell?"2px solid #6ee7b7":`1px solid ${ci.border}`,
                              fontSize:13,
                            }}>
                            {isEditCell?"✏️":ci.label}
                          </td>
                        );
                      })}
                      <td style={{...td,fontWeight:800,fontSize:13,color:"#1f2937"}}>{total||"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{padding:"5px 12px 8px",fontSize:10,color:"#9ca3af",display:"flex",gap:14,flexWrap:"wrap"}}>
            <span>* đang P1</span><span>⛳ đang P2</span>
            <span style={{color:"#16a34a"}}>■ Birdie-</span>
            <span style={{color:"#374151"}}>■ Par</span>
            <span style={{color:"#d97706"}}>■ Bogey</span>
            <span style={{color:"#ef4444"}}>■ 2+ Bogey</span>
          </div>
        </div>

        {/* PANEL NHẬP GẬY */}
        {editing&&editHole&&editPlayer&&editPs&&(()=>{
          const max=MAX_STROKES[editHole.par];
          const threshold=P2_THRESHOLD[editHole.par];
          const totalY=holeYardsForTee(editHole,editPlayer.tee||"white");
          const p1Used=editPs.p1shots.length;
          const p2Used=editPs.p2shots.length;
          const playerPhase=editPs.phase;
          const usedY=editPs.p1shots.reduce((s,sh)=>s+(sh.yardsMeasured||0),0);
          const rem=totalY?Math.max(0,totalY-usedY):null;

          const yardsAfter=(idx)=>{
            if(!totalY)return null;
            let g=0;for(let k=0;k<=idx;k++)g+=(editPs.p1shots[k].yardsMeasured||0);
            return Math.max(0,totalY-g);
          };

          return(
            <div style={{background:"#fff",borderRadius:14,border:"2px solid #1f2937",marginBottom:14,overflow:"hidden"}}>
              {/* Header panel */}
              <div style={{background:"linear-gradient(135deg,#1f2937,#374151)",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{color:"#fff"}}>
                  <span style={{fontSize:16,fontWeight:900,color:TEAM_COLORS[editPlayer.team]||"#fff"}}>{editPlayer.name}</span>
                  <span style={{fontSize:13,color:"#9ca3af",marginLeft:8}}>· Hố {editing.holeIdx+1} · Par {editHole.par}</span>
                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    <Badge color={editPlayer.team}>{editPlayer.team}</Badge>
                    <TeeBadge teeId={editPlayer.tee||"white"}/>
                    <span style={{fontSize:11,color:"#9ca3af",alignSelf:"center"}}>
                      {totalY>0?`${totalY}y`:"—"} · max {max} gậy · ≤{threshold}y
                    </span>
                  </div>
                </div>
                <button onClick={closeEdit} style={{background:"rgba(255,255,255,0.1)",color:"#fff",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>✕ Đóng</button>
              </div>

              <div style={{padding:"14px 16px"}}>
                {/* Phase tabs */}
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  <div style={{flex:1,textAlign:"center",padding:"8px",borderRadius:10,
                    background:playerPhase===1?"#dcfce7":"#f9fafb",
                    border:playerPhase===1?"2px solid #16a34a":"1.5px solid #e5e7eb"}}>
                    <div style={{fontSize:11,fontWeight:700,color:playerPhase===1?"#15803d":"#9ca3af"}}>📡 GIAI ĐOẠN 1</div>
                    <div style={{fontSize:13,fontWeight:800,color:"#374151"}}>{p1Used}/{max} gậy</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",color:"#9ca3af",fontSize:16}}>→</div>
                  <div style={{flex:1,textAlign:"center",padding:"8px",borderRadius:10,
                    background:playerPhase===2?"#fef9c3":"#f9fafb",
                    border:playerPhase===2?"2px solid #d97706":"1.5px solid #e5e7eb"}}>
                    <div style={{fontSize:11,fontWeight:700,color:playerPhase===2?"#92400e":"#9ca3af"}}>⛳ GIAI ĐOẠN 2</div>
                    <div style={{fontSize:13,fontWeight:800,color:"#374151"}}>{p2Used} gậy</div>
                  </div>
                  {playerPhase===3&&<div style={{flex:1,textAlign:"center",padding:"8px",borderRadius:10,background:"#f0fdf4",border:"2px solid #16a34a"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#15803d"}}>✅ XONG</div>
                    <div style={{fontSize:13,fontWeight:800,color:"#16a34a"}}>{p1Used+p2Used} gậy</div>
                  </div>}
                </div>

                {/* Yard tracker (P1) */}
                {playerPhase===1&&totalY>0&&(
                  <div style={{display:"flex",gap:0,marginBottom:12,borderRadius:10,overflow:"hidden",border:"1.5px solid #e5e7eb"}}>
                    {[
                      {label:"Tổng",val:`${totalY}y`,color:"#374151",bg:"#f9fafb"},
                      {label:"Đã đi",val:`${usedY}y`,color:"#16a34a",bg:"#f0fdf4"},
                      {label:"Còn lại",val:`${rem}y`,color:rem<=threshold?"#dc2626":rem<=threshold*2?"#d97706":"#374151",bg:rem<=threshold?"#fef2f2":rem<=threshold*2?"#fefce8":"#f9fafb"},
                    ].map((x,i)=>(
                      <div key={i} style={{flex:1,textAlign:"center",padding:"8px 4px",background:x.bg,borderLeft:i>0?"1px solid #e5e7eb":"none"}}>
                        <div style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>{x.label}</div>
                        <div style={{fontSize:16,fontWeight:800,color:x.color}}>{x.val}</div>
                        {x.label==="Còn lại"&&rem<=threshold&&<div style={{fontSize:9,color:"#dc2626",fontWeight:700}}>→ P2</div>}
                      </div>
                    ))}
                  </div>
                )}

                {/* P2 summary banner */}
                {playerPhase===2&&(
                  <div style={{background:"#f0fdf4",borderRadius:8,padding:"7px 12px",marginBottom:12,border:"1px solid #86efac",fontSize:12,color:"#15803d",fontWeight:600}}>
                    ✅ GĐ1 xong ({p1Used} gậy) — {editPs.enteredP2At50?`còn ≤${threshold}y`:"đủ số gậy tối đa"} → Chip/Putt
                  </div>
                )}

                {/* Shot log P1 */}
                {p1Used>0&&(
                  <div style={{marginBottom:10,background:"#f9fafb",borderRadius:8,padding:"8px 10px",border:"1px solid #e5e7eb"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5}}>📡 P1:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {editPs.p1shots.map((s,i)=>{
                        const ay=yardsAfter(i);
                        return(
                          <div key={i} style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:6,padding:"3px 8px",fontSize:11,display:"flex",gap:5}}>
                            <b style={{color:"#1d4ed8"}}>{s.club}</b>
                            {s.yardsMeasured>0&&<span style={{color:"#16a34a"}}>−{s.yardsMeasured}y</span>}
                            {ay!==null&&<span style={{color:ay<=threshold?"#ef4444":"#9ca3af"}}>→{ay}y</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Shot log P2 */}
                {p2Used>0&&(
                  <div style={{marginBottom:10,background:"#fffbeb",borderRadius:8,padding:"8px 10px",border:"1px solid #fde68a"}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#92400e",marginBottom:5}}>⛳ P2:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {editPs.p2shots.map((s,i)=>(
                        <div key={i} style={{background:"#fff",border:"1px solid #fde68a",borderRadius:6,padding:"3px 8px",fontSize:11}}>
                          <b style={{color:"#b45309"}}>{s.club}</b>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* INPUT P1 */}
                {playerPhase===1&&(
                  <>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:6,fontWeight:600}}>📡 Gậy {p1Used+1} — Chọn gậy:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                      {CLUBS_P1.map(c=>(
                        <button key={c} onClick={()=>setShotClub(c)} style={{padding:"6px 9px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",
                          border:shotClub===c?"2px solid #1f2937":"1.5px solid #d1d5db",
                          background:shotClub===c?"#1f2937":"#fff",color:shotClub===c?"#fff":"#374151"}}>{c}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                      <div style={{flex:1,background:"#f0fdf4",borderRadius:8,padding:"8px 10px",border:"1px solid #86efac"}}>
                        <div style={{fontSize:11,color:"#15803d",fontWeight:700,marginBottom:4}}>📡 Số yard gậy này:</div>
                        <input type="number" value={shotYards} onChange={e=>setShotYards(e.target.value)}
                          placeholder="Nhập yard" min={0} max={600}
                          style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1.5px solid #86efac",fontSize:15,background:"#fff",boxSizing:"border-box"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={recordShotP1} style={{flex:1,background:"#16a34a",color:"#fff",border:"none",borderRadius:9,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>✅ Ghi gậy P1</button>
                      <button onClick={undoShot} disabled={!p1Used} style={{background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:9,padding:"11px 14px",fontSize:14,fontWeight:600,cursor:p1Used?"pointer":"default",opacity:p1Used?1:0.4}}>↩</button>
                    </div>
                  </>
                )}

                {/* INPUT P2 */}
                {playerPhase===2&&(
                  <>
                    <div style={{fontSize:12,color:"#6b7280",marginBottom:6,fontWeight:600}}>⛳ Gậy {p2Used+1} (Chip/Putt) — Chọn gậy:</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                      {CLUBS_P2.map(c=>(
                        <button key={c} onClick={()=>setShotClub(c)} style={{padding:"7px 12px",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",
                          border:shotClub===c?"2px solid #92400e":"1.5px solid #d1d5db",
                          background:shotClub===c?"#92400e":"#fff",color:shotClub===c?"#fff":"#374151"}}>{c}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:8,marginBottom:10}}>
                      <button onClick={recordShotP2} style={{flex:1,background:"#d97706",color:"#fff",border:"none",borderRadius:9,padding:"11px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>⛳ Ghi gậy P2</button>
                      <button onClick={undoShot} style={{background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:9,padding:"11px 14px",fontSize:14,fontWeight:600,cursor:"pointer"}}>↩</button>
                    </div>
                    <button onClick={finishP2} style={{width:"100%",background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:9,padding:"12px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                      🏌️ Vào lỗ! — Tổng {p1Used+p2Used} gậy
                    </button>
                  </>
                )}

                {/* Đã xong */}
                {playerPhase===3&&(
                  <div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#15803d"}}>
                      ✅ Xong: {p1Used} (P1) + {p2Used} (P2) = <b style={{fontSize:18}}>{p1Used+p2Used}</b> gậy
                    </div>
                    <button onClick={undoShot} style={{background:"#fff",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:600}}>↩ Sửa</button>
                  </div>
                )}
              </div>
            </div>
          );
        })()}

        {!editing&&(
          <div style={{background:"#fff",borderRadius:12,padding:"14px 16px",marginBottom:14,border:"1.5px solid #e5e7eb",textAlign:"center",color:"#9ca3af",fontSize:13}}>
            👆 Click vào ô trong bảng để nhập gậy cho người chơi bất kỳ
          </div>
        )}

        {/* FINISH BUTTON */}
        <button onClick={finishSession} style={{
          width:"100%",
          background:allDone?"linear-gradient(135deg,#16a34a,#15803d)":"linear-gradient(135deg,#374151,#1f2937)",
          color:"#fff",border:"none",borderRadius:12,padding:"14px 0",fontSize:16,fontWeight:800,cursor:"pointer",
          boxShadow:allDone?"0 4px 14px rgba(22,163,74,0.4)":"none",
        }}>
          {allDone?"🏆 Kết thúc & Xem kết quả!":"⏹ Kết thúc buổi chơi (lưu kết quả hiện tại)"}
        </button>
      </div>
    );
  };

  // ── RENDER DONE ───────────────────────────────────────────────────────────
  const renderDone=()=>{
    const sess=sessions[0];if(!sess)return null;
    const{playerScores,teamScores}=calcSessionScores(sess);
    return(
      <div style={{maxWidth:740,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:40}}>🏆</div>
          <h2 style={{fontSize:24,fontWeight:900,color:"#1f2937"}}>Kết quả buổi {sess.date}</h2>
        </div>

        {/* Team cards */}
        <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
          {teamScores.map((t,i)=>(
            <div key={t.team} style={{background:TEAM_BG[t.team],border:`2px solid ${TEAM_COLORS[t.team]}`,borderRadius:14,padding:"16px 20px",flex:1,minWidth:160}}>
              <div style={{fontSize:18,fontWeight:800,color:TEAM_COLORS[t.team]}}>{["🥇","🥈","🥉"][i]||""} Team {t.team}</div>
              <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{t.members.join(" · ")}</div>
              <div style={{marginTop:8,display:"flex",gap:16}}>
                <div><div style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>NET TOTAL</div>
                  <div style={{fontSize:26,fontWeight:900,color:TEAM_COLORS[t.team]}}>{t.netTotal.toFixed(1)}</div></div>
                <div><div style={{fontSize:10,color:"#9ca3af",fontWeight:600}}>GROSS</div>
                  <div style={{fontSize:26,fontWeight:900,color:"#374151"}}>{t.grossTotal}</div></div>
              </div>
            </div>
          ))}
        </div>

        {/* Cá nhân */}
        <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",overflow:"hidden",marginBottom:16}}>
          <div style={{background:"#1f2937",color:"#fff",padding:"10px 16px",fontWeight:700,fontSize:14}}>👤 Điểm cá nhân</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#f9fafb"}}>
                <th style={th}>Hạng</th><th style={th}>Tên</th><th style={th}>Team</th><th style={th}>Tee</th>
                <th style={th}>HCP</th><th style={th}>−HCP</th><th style={th}>Gross</th><th style={th}>Net</th>
              </tr></thead>
              <tbody>{[...playerScores].sort((a,b)=>a.net-b.net).map((p,i)=>(
                <tr key={p.id} style={{background:i===0?"#fef9c3":i%2===0?"#f9fafb":"#fff"}}>
                  <td style={td}>{["🥇","🥈","🥉"][i]||i+1}</td>
                  <td style={{...td,fontWeight:700}}>{p.name}</td>
                  <td style={td}><Badge color={p.team}>{p.team}</Badge></td>
                  <td style={td}><TeeBadge teeId={p.tee||"white"}/></td>
                  <td style={td}>{p.hcp}</td>
                  <td style={{...td,color:"#16a34a"}}>−{p.hcpStrokes.toFixed(1)}</td>
                  <td style={td}>{p.gross}</td>
                  <td style={{...td,fontWeight:800,color:"#1d4ed8"}}>{p.net.toFixed(1)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>

        {/* Chi tiết hố */}
        <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",overflow:"hidden",marginBottom:16}}>
          <div style={{background:"#374151",color:"#fff",padding:"10px 16px",fontWeight:700,fontSize:14}}>⛳ Chi tiết từng hố</div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#f9fafb"}}>
                <th style={{...th,textAlign:"left",paddingLeft:12}}>Người</th>
                {sess.holes.map((h,i)=><th key={h.id} style={th}>H{i+1}<br/><span style={{fontWeight:400,fontSize:10}}>P{h.par}</span></th>)}
                <th style={th}>Gross</th>
              </tr></thead>
              <tbody>{playerScores.map(p=>(
                <tr key={p.id}>
                  <td style={{...td,fontWeight:700,textAlign:"left",paddingLeft:12}}>
                    <span style={{color:TEAM_COLORS[p.team]}}>●</span> {p.name}
                  </td>
                  {sess.holes.map(h=>{
                    const s=h.strokes[p.id];
                    const sc=s?calcHoleStrokes(s,h.par):0;
                    const diff=sc>0?sc-h.par:null;
                    return<td key={h.id} style={{...td,fontWeight:700,
                      color:diff===null?"#d1d5db":diff<0?"#16a34a":diff===0?"#374151":diff===1?"#d97706":"#ef4444"}}>
                      {sc||"—"}
                    </td>;
                  })}
                  <td style={{...td,fontWeight:800}}>{p.gross}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>

        <button onClick={()=>{setPhase("setup");setHoles([]);setEditing(null);}}
          style={{background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",
            borderRadius:12,padding:"13px 36px",fontSize:15,fontWeight:800,cursor:"pointer"}}>🔄 Buổi mới</button>
      </div>
    );
  };

  // ── RENDER HISTORY ────────────────────────────────────────────────────────
  const renderHistory=()=>{
    const totals={};
    sessions.forEach(sess=>{const{playerScores}=calcSessionScores(sess);
      playerScores.forEach(p=>{
        if(!totals[p.id])totals[p.id]={...p,totalNet:0,totalGross:0,sessions:0};
        totals[p.id].totalNet+=p.net;totals[p.id].totalGross+=p.gross;totals[p.id].sessions+=1;
      });
    });
    const lb=Object.values(totals).sort((a,b)=>a.totalNet-b.totalNet);
    return(
      <div style={{maxWidth:740,margin:"0 auto"}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#1f2937",marginBottom:16}}>📊 Leaderboard tích lũy</h2>
        {lb.length===0&&<div style={{color:"#9ca3af",padding:20}}>Chưa có buổi nào.</div>}
        {lb.length>0&&<div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",overflow:"hidden",marginBottom:20}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead><tr style={{background:"#1f2937",color:"#fff"}}>
                <th style={th2}>Hạng</th><th style={th2}>Tên</th><th style={th2}>Team</th><th style={th2}>Tee</th>
                <th style={th2}>Buổi</th><th style={th2}>Avg Gross</th><th style={th2}>Avg Net</th><th style={th2}>Tổng Net</th>
              </tr></thead>
              <tbody>{lb.map((p,i)=>(
                <tr key={p.id} style={{background:i===0?"#fef9c3":i%2===0?"#f9fafb":"#fff"}}>
                  <td style={td}>{["🥇","🥈","🥉"][i]||i+1}</td>
                  <td style={{...td,fontWeight:700}}>{p.name}</td>
                  <td style={td}><Badge color={p.team}>{p.team}</Badge></td>
                  <td style={td}><TeeBadge teeId={p.tee||"white"}/></td>
                  <td style={td}>{p.sessions}</td>
                  <td style={td}>{(p.totalGross/p.sessions).toFixed(1)}</td>
                  <td style={td}>{(p.totalNet/p.sessions).toFixed(1)}</td>
                  <td style={{...td,fontWeight:800,color:"#1d4ed8"}}>{p.totalNet.toFixed(1)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>}
        <h3 style={{fontSize:16,fontWeight:700,color:"#374151",marginBottom:10}}>📅 Lịch sử các buổi</h3>
        {sessions.map(sess=>{
          const{teamScores}=calcSessionScores(sess);
          return(<div key={sess.id} style={{background:"#fff",borderRadius:12,border:"1.5px solid #e5e7eb",padding:"12px 16px",marginBottom:8,cursor:"pointer"}}
            onClick={()=>setShowHistory(showHistory===sess.id?null:sess.id)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>📅 {sess.date}</div>
                <div style={{fontSize:12,color:"#6b7280"}}>{sess.holes.length} hố · {sess.players.length} người</div>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {teamScores.map((t,i)=><div key={t.team} style={{textAlign:"center"}}>
                  <Badge color={t.team}>{["🥇","🥈","🥉"][i]} {t.team}</Badge>
                  <div style={{fontSize:10,color:"#9ca3af",marginTop:1}}>Net {t.netTotal.toFixed(1)}</div>
                </div>)}
              </div>
            </div>
            {showHistory===sess.id&&(()=>{const{playerScores}=calcSessionScores(sess);return(
              <div style={{marginTop:10,overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"#f9fafb"}}>
                    <th style={th}>Tên</th><th style={th}>Tee</th><th style={th}>Gross</th><th style={th}>−HCP</th><th style={th}>Net</th>
                  </tr></thead>
                  <tbody>{[...playerScores].sort((a,b)=>a.net-b.net).map(p=>(
                    <tr key={p.id}>
                      <td style={{...td,fontWeight:700}}><span style={{color:TEAM_COLORS[p.team]}}>●</span> {p.name}</td>
                      <td style={td}><TeeBadge teeId={p.tee||"white"}/></td>
                      <td style={td}>{p.gross}</td>
                      <td style={{...td,color:"#16a34a"}}>−{p.hcpStrokes.toFixed(1)}</td>
                      <td style={{...td,fontWeight:800}}>{p.net.toFixed(1)}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            );})()}
          </div>);
        })}
      </div>
    );
  };

  const navItems=[{id:"session",label:"🏌️ Đánh"},{id:"history",label:"📊 Lịch sử"},{id:"settings",label:"⚙️ Cài đặt"}];

  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(135deg,#1f2937,#111827)",color:"#fff",padding:"12px 18px",
        display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
        <div>
          <div style={{fontSize:19,fontWeight:900}}>⛳ Golf Scorecard</div>
          <div style={{fontSize:10,color:"#9ca3af"}}>Free Order · Handicap · Multi-Tee</div>
        </div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
          {TEES.map(t=><span key={t.id} style={{fontSize:10,padding:"2px 5px",background:"rgba(255,255,255,0.1)",borderRadius:4}}>{t.emoji}{t.label}</span>)}
        </div>
      </div>
      <div style={{background:"#fff",borderBottom:"1.5px solid #e5e7eb",display:"flex"}}>
        {navItems.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,padding:"12px 0",border:"none",
          background:tab===n.id?"#f0fdf4":"#fff",color:tab===n.id?"#16a34a":"#6b7280",
          fontWeight:tab===n.id?800:500,fontSize:13,cursor:"pointer",
          borderBottom:tab===n.id?"3px solid #16a34a":"3px solid transparent"}}>{n.label}</button>)}
      </div>
      <div style={{padding:"18px 12px"}}>
        {tab==="session"&&(phase==="setup"?renderSetup():phase==="playing"?renderPlaying():renderDone())}
        {tab==="history"&&renderHistory()}
        {tab==="settings"&&<SettingsPanel players={players} setPlayers={newP=>{setPlayers(newP);setActivePlayers(newP.map(p=>({...p,active:true})));}}/>}
      </div>
    </div>
  );
}

// ── SETTINGS PANEL ────────────────────────────────────────────────────────────
function SettingsPanel({players,setPlayers}){
  const [editIdx,setEditIdx]=useState(null);
  const [ef,setEf]=useState({name:"",team:"Chavis",hcp:18,tee:"white"});
  const [addMode,setAddMode]=useState(false);
  const [nf,setNf]=useState({name:"",team:"Chavis",hcp:18,tee:"white"});
  const [confirmDel,setConfirmDel]=useState(null);
  const inp={padding:"7px 10px",borderRadius:8,border:"1.5px solid #d1d5db",fontSize:14};
  const sel={...inp,background:"#fff",cursor:"pointer"};
  const TeeSelect=({val,onChange})=><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
    {TEES.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{padding:"5px 10px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
      border:val===t.id?`2px solid ${t.color}`:"1.5px solid #d1d5db",background:val===t.id?t.bg:"#fff",color:t.color}}>{t.emoji} {t.label}</button>)}
  </div>;
  return(
    <div style={{maxWidth:740,margin:"0 auto"}}>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1f2937",marginBottom:5}}>⚙️ Quản lý thành viên</h2>
      <p style={{fontSize:12,color:"#9ca3af",marginBottom:14}}>Thêm, sửa tên, đổi nhóm, HCP và Tee.</p>
      <div style={{background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",overflow:"hidden",marginBottom:14}}>
        {players.map((p,i)=>(
          <div key={p.id}>
            {editIdx!==i&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",flexWrap:"wrap",
              borderBottom:i<players.length-1?"1px solid #f3f4f6":"none",background:confirmDel===i?"#fef2f2":"#fff"}}>
              <div style={{fontWeight:700,fontSize:14,minWidth:70,color:TEAM_COLORS[p.team]||"#374151"}}>{p.name}</div>
              <Badge color={p.team}>{p.team}</Badge>
              <TeeBadge teeId={p.tee||"white"}/>
              <span style={{fontSize:12,color:"#6b7280"}}>HCP {p.hcp}</span>
              <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                {confirmDel===i?<>
                  <span style={{fontSize:12,color:"#ef4444",fontWeight:700}}>Xóa?</span>
                  <button onClick={()=>{setPlayers(players.filter((_,j)=>j!==i));setConfirmDel(null);}} style={{background:"#ef4444",color:"#fff",border:"none",borderRadius:7,padding:"4px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>✓</button>
                  <button onClick={()=>setConfirmDel(null)} style={{background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:7,padding:"4px 10px",fontWeight:600,cursor:"pointer",fontSize:12}}>Hủy</button>
                </>:<>
                  <button onClick={()=>{setEditIdx(i);setEf({name:p.name,team:p.team,hcp:p.hcp,tee:p.tee||"white"});setAddMode(false);}} style={{background:"#eff6ff",color:"#1d4ed8",border:"1.5px solid #bfdbfe",borderRadius:7,padding:"4px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>✏️</button>
                  <button onClick={()=>setConfirmDel(i)} style={{background:"#fff",color:"#ef4444",border:"1.5px solid #fca5a5",borderRadius:7,padding:"4px 12px",fontWeight:700,cursor:"pointer",fontSize:12}}>🗑</button>
                </>}
              </div>
            </div>}
            {editIdx===i&&<div style={{padding:"12px 16px",background:"#f0fdf4",borderLeft:"3px solid #16a34a",borderBottom:i<players.length-1?"1px solid #e5e7eb":"none"}}>
              <div style={{fontSize:12,color:"#16a34a",fontWeight:700,marginBottom:8}}>✏️ Sửa: {p.name}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
                <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>Tên</label>
                  <input value={ef.name} onChange={e=>setEf(f=>({...f,name:e.target.value}))} style={{...inp,width:110}}/></div>
                <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>Nhóm</label>
                  <select value={ef.team} onChange={e=>setEf(f=>({...f,team:e.target.value}))} style={{...sel,width:95}}>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
                <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>HCP</label>
                  <input type="number" value={ef.hcp} onChange={e=>setEf(f=>({...f,hcp:e.target.value}))} min={0} max={54} style={{...inp,width:55,textAlign:"center"}}/></div>
              </div>
              <div style={{marginBottom:8}}><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:5}}>Tee:</label>
                <TeeSelect val={ef.tee} onChange={v=>setEf(f=>({...f,tee:v}))}/></div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{if(!ef.name.trim())return alert("Tên không được trống!");setPlayers(players.map((x,j)=>j===i?{...x,...ef,hcp:parseInt(ef.hcp)||0}:x));setEditIdx(null);}} style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:7,padding:"7px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>💾 Lưu</button>
                <button onClick={()=>setEditIdx(null)} style={{background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:7,padding:"7px 12px",fontWeight:600,cursor:"pointer",fontSize:13}}>Hủy</button>
              </div>
            </div>}
          </div>
        ))}
      </div>
      {!addMode
        ?<button onClick={()=>{setAddMode(true);setEditIdx(null);}} style={{background:"linear-gradient(135deg,#1d4ed8,#2563eb)",color:"#fff",border:"none",borderRadius:11,padding:"11px 24px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(29,78,216,0.3)"}}>➕ Thêm thành viên</button>
        :<div style={{background:"#fff",borderRadius:14,border:"2px solid #3b82f6",padding:18,marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1d4ed8",marginBottom:12}}>➕ Thêm mới</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>Tên *</label>
              <input value={nf.name} onChange={e=>setNf(f=>({...f,name:e.target.value}))} placeholder="Nhập tên..." style={{...inp,width:120}}/></div>
            <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>Nhóm</label>
              <select value={nf.team} onChange={e=>setNf(f=>({...f,team:e.target.value}))} style={{...sel,width:95}}>{TEAMS.map(t=><option key={t}>{t}</option>)}</select></div>
            <div><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:3}}>HCP</label>
              <input type="number" value={nf.hcp} onChange={e=>setNf(f=>({...f,hcp:e.target.value}))} min={0} max={54} style={{...inp,width:55,textAlign:"center"}}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={{fontSize:11,color:"#6b7280",display:"block",marginBottom:5}}>Tee:</label>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {TEES.map(t=><button key={t.id} onClick={()=>setNf(f=>({...f,tee:t.id}))} style={{padding:"5px 9px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",border:nf.tee===t.id?`2px solid ${t.color}`:"1.5px solid #d1d5db",background:nf.tee===t.id?t.bg:"#fff",color:t.color}}>{t.emoji} {t.label}</button>)}
            </div></div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>{if(!nf.name.trim())return alert("Tên không được trống!");setPlayers([...players,{id:uid(),name:nf.name.trim(),team:nf.team,hcp:parseInt(nf.hcp)||0,tee:nf.tee}]);setNf({name:"",team:"Chavis",hcp:18,tee:"white"});setAddMode(false);}} style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:7,padding:"8px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>✓ Thêm</button>
            <button onClick={()=>setAddMode(false)} style={{background:"#f3f4f6",color:"#374151",border:"1.5px solid #d1d5db",borderRadius:7,padding:"8px 12px",fontWeight:600,cursor:"pointer",fontSize:13}}>Hủy</button>
          </div>
        </div>}
      <div style={{marginTop:18,background:"#fff",borderRadius:14,border:"1.5px solid #e5e7eb",padding:14}}>
        <div style={{fontWeight:700,color:"#374151",marginBottom:8}}>📋 Tổng quan nhóm</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {TEAMS.map(team=>{const mems=players.filter(p=>p.team===team);return(
            <div key={team} style={{background:TEAM_BG[team],border:`1.5px solid ${TEAM_COLORS[team]}`,borderRadius:10,padding:"9px 14px",minWidth:140}}>
              <div style={{fontWeight:800,color:TEAM_COLORS[team],marginBottom:5,fontSize:13}}>Team {team}</div>
              {mems.map(p=><div key={p.id} style={{fontSize:12,color:"#374151",padding:"2px 0",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                {p.name} <TeeBadge teeId={p.tee||"white"}/> <span style={{color:"#9ca3af",fontSize:10}}>HCP{p.hcp}</span>
              </div>)}
              {mems.length===0&&<div style={{fontSize:11,color:"#9ca3af"}}>Chưa có ai</div>}
            </div>
          );})}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
